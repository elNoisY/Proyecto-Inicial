{% extends "base.html" %}
{% block content %}

<h2>Crear Post</h2>

<form method="POST" enctype="multipart/form-data">
    {{ form.hidden_tag() }}

    <p>
        {{ form.title.label }}<br>
        {{ form.title() }}
    </p>

    <p>
        {{ form.content.label }}<br>
        {{ form.content() }}
    </p>

    <p>
        {{ form.image.label }}<br>
        {{ form.image() }}
    </p>

    <p>{{ form.submit() }}</p>
</form>

{% endblock %}
